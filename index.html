<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey You!!! ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
    animation:fadeIn 2s ease-in;
}

h1{
    font-size:2.5rem;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4b7d;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Page transition */
.fade-out{
    animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
    to{opacity:0; transform:translateY(-20px);}
}
</style>

<script>
function nextPage(){
    document.body.classList.add("fade-out");
    setTimeout(()=>{
        window.location.href="story.html";
    },800);
}
</script>

</head>

<body>

<div class="container">
    <h1>Hey Riddhi ✨</h1>
    <p>I made something for you...</p>
    <button onclick="nextPage()">Tap Here 💌</button>
</div>

</body>
</html>
