<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~~Something Important!!!</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff0f5;
    font-family:Arial;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:slideIn 1.5s ease;
}

p{
    font-size:20px;
    margin:15px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border-radius:25px;
    border:none;
    background:#ff4b7d;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes slideIn{
    from{opacity:0; transform:translateX(100px);}
    to{opacity:1; transform:translateX(0);}
}

.fade-out{
    animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
    to{opacity:0; transform:translateX(-50px);}
}
</style>

<script>
function nextPage(){
    document.body.classList.add("fade-out");
    setTimeout(()=>{
        window.location.href="final.html";
    },800);
}
</script>

</head>

<body>

<div class="container">
    <h2>You know what? 💖</h2>
    <p>Somehow, you became my favorite part of the day.</p>
    <p>Since i had seen you from the first day,</p>
    <p>Your smile feels like peace... 😌</p>
    <p>And I just wanted to say something...</p>

    <button onclick="nextPage()">Continue 🌹</button>
</div>

</body>
</html>
